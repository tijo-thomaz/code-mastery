  <title>GSAP Day 1 — Basics</title>
  <style>
    body { margin: 0; background: #1a1a2e; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; }
    .box { width: 100px; height: 100px; border-radius: 12px; }
    .box-1 { background: #e94560; }

    button { padding: 10px 20px; border: none; border-radius: 8px; background: #e94560; color: #fff; cursor: pointer; font-size: 14px; }
    button:hover { opacity: 0.8; }
    .row { display: flex; gap: 40px; align-items: center; }
    h3 { margin: 0 0 8px; font-size: 14px; color: #888; }
